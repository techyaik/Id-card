<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student ID Card</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Roboto:ital,wght@0,400;0,500;0,700;0,900;1,400&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="card">
        <div class="card-border">

            <!-- ===== BACKGROUND LAYERS (SVG) ===== -->
            <svg class="bg-layer" viewBox="0 0 340 520" preserveAspectRatio="none">
                <!-- White base -->
                <rect width="340" height="520" fill="#FFFFFF" />
                <!-- Purple header block -->
                <rect width="340" height="134" fill="#3B2275" />
                <!-- White divider line -->
                <rect y="134" width="340" height="8" fill="#FFFFFF" />
                <!-- Orange/gold stripe -->
                <rect y="142" width="340" height="30" fill="#D48C1F" />

                <!-- Bottom gold swoosh (asymmetric, heavy on the left) -->
                <path d="M0 440 Q170 310 330 450 L340 520 L0 520Z" fill="#D48C1F" />
                <!-- Bottom purple hill (symmetric dome) -->
                <path d="M0 460 Q170 310 340 470 L340 520 L0 520Z" fill="#3B2275" />
            </svg>

            <!-- ===== HEADER TEXT ===== -->
            <div class="header-text">
                K.R.B ADARSH ENG. HR.<br>SEC. SCHOOL KARELI
            </div>

            <!-- ===== STUDENT PHOTO ===== -->
            <div class="photo-ring">
                <div class="photo-clip">
                    <img src="/Users/asifimrankhan/.gemini/antigravity-ide/brain/2aba2b2b-edb7-41ea-a8f6-576acfdd1eb6/student_photo_1780685189520.png"
                        alt="Student Photo">
                </div>
            </div>

            <!-- ===== INFO CARD (white, slanted top) ===== -->
            <div class="info-card-wrapper">
                <div class="info-card">
                    <div class="info-card-content">
                        <!-- Student name -->
                        <div class="student-name">PRADEEP KUMAR DEWANGAN</div>
                        <!-- Details -->
                        <table class="info-table">
                            <tr>
                                <td class="lbl">Father</td>
                                <td class="sep">-</td>
                                <td class="val">Naresh Dewangan</td>
                            </tr>
                            <tr>
                                <td class="lbl">Mother</td>
                                <td class="sep">-</td>
                                <td class="val">Venuka Dewangan</td>
                            </tr>
                            <tr>
                                <td class="lbl">Class</td>
                                <td class="sep">-</td>
                                <td class="val">3rd</td>
                            </tr>
                            <tr>
                                <td class="lbl">D.O.B.</td>
                                <td class="sep">-</td>
                                <td class="val">02/07/2016</td>
                            </tr>
                            <tr>
                                <td class="lbl">Mob.</td>
                                <td class="sep">-</td>
                                <td class="val">1234567890</td>
                            </tr>
                            <tr>
                                <td class="lbl">Add.</td>
                                <td class="sep">-</td>
                                <td class="val">Shiv mandir para Motipur RJN</td>
                            </tr>
                        </table>
                    </div>
                </div>
            </div>

            <!-- ===== LOGO BOX ===== -->
            <div class="logo-box">
                <svg viewBox="0 0 50 48" fill="none">
                    <!-- Open book shape -->
                    <path
                        d="M11 28 C11 28,17 23,25 25.5 C33 23,39 28,39 28 L39 33 C39 33,33 28,25 30.5 C17 28,11 33,11 33Z"
                        fill="#3B2275" />
                    <path
                        d="M11 24 C11 24,17 19,25 21.5 C33 19,39 24,39 24 L39 29 C39 29,33 24,25 26.5 C17 24,11 29,11 29Z"
                        fill="#3B2275" />
                    <!-- Sun circle -->
                    <circle cx="25" cy="17" r="5.5" fill="#D48C1F" />
                    <!-- Sun rays -->
                    <line x1="25" y1="9" x2="25" y2="5" stroke="#D48C1F" stroke-width="1.8" />
                    <line x1="18" y1="12" x2="15" y2="9" stroke="#D48C1F" stroke-width="1.8" />
                    <line x1="32" y1="12" x2="35" y2="9" stroke="#D48C1F" stroke-width="1.8" />
                    <line x1="13" y1="18" x2="10" y2="18" stroke="#D48C1F" stroke-width="1.5" />
                    <line x1="37" y1="18" x2="40" y2="18" stroke="#D48C1F" stroke-width="1.5" />
                    <!-- Center pillar -->
                    <rect x="23.5" y="14" width="3" height="14" fill="#3B2275" />
                    <polygon points="23.5,14 25,10 26.5,14" fill="#3B2275" />
                    <!-- Text -->
                    <text x="25" y="40" font-size="5" font-weight="900" fill="#D48C1F" text-anchor="middle"
                        font-family="Arial, sans-serif">K.R.B ADARSH</text>
                    <text x="25" y="46" font-size="4.5" font-weight="700" fill="#3B2275" text-anchor="middle"
                        font-family="Arial, sans-serif" font-style="italic">TECHNOLOGY</text>
                </svg>
            </div>

            <!-- ===== PHONE BADGE ===== -->
            <div class="phone-badge">
                <svg class="phone-icon" viewBox="0 0 24 24" fill="white">
                    <path
                        d="M21.9,7.9c-0.2-0.8-0.9-1.4-1.7-1.6c-2.4-0.6-5-0.9-8.2-0.9S6.2,5.7,3.8,6.3C3,6.5,2.3,7.1,2.1,7.9C1.9,8.7,2.3,9.5,3,9.9c1.2,0.7,2.6,1,4.1,0.8c0.7-0.1,1.1-0.7,1.1-1.4V8.3c1.2-0.2,2.5-0.3,3.8-0.3s2.6,0.1,3.8,0.3v1c0,0.7,0.4,1.3,1.1,1.4c1.5,0.2,2.9-0.1,4.1-0.8C21.7,9.5,22.1,8.7,21.9,7.9z" />
                    <path d="M5.5,12h13l-1.5,8h-10L5.5,12z" />
                </svg>
                <span>1234567890</span>
            </div>

            <!-- ===== FOOTER TEXT ===== -->
            <div class="footer-text">
                Managed by- Adarsh Shikshan Samiti kareli
            </div>

        </div>
    </div>
</body>

</html>
